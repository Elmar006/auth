<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-wrapper">
            <!-- Форма входа -->
            <div class="auth-form active" id="login-form">
                <h2>Вход</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" name="email" required placeholder="example@mail.ru">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Пароль</label>
                        <input type="password" id="login-password" name="password" required placeholder="Введите пароль">
                    </div>
                    <button type="submit" class="btn-primary">Войти</button>
                </form>
                <p class="switch-form">
                    Нет аккаунта? 
                    <a href="#" onclick="showForm('register')">Зарегистрироваться</a>
                </p>
            </div>

            <!-- Форма регистрации -->
            <div class="auth-form" id="register-form">
                <h2>Регистрация</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="register-name">Имя</label>
                        <input type="text" id="register-name" name="name" required placeholder="Ваше имя">
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" name="email" required placeholder="example@mail.ru">
                    </div>
                    <div class="form-group">
                        <label for="register-password">Пароль</label>
                        <input type="password" id="register-password" name="password" required placeholder="Придумайте пароль" minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="register-confirm">Подтвердите пароль</label>
                        <input type="password" id="register-confirm" name="confirm" required placeholder="Повторите пароль" minlength="6">
                    </div>
                    <button type="submit" class="btn-primary">Зарегистрироваться</button>
                </form>
                <p class="switch-form">
                    Уже есть аккаунт? 
                    <a href="#" onclick="showForm('login')">Войти</a>
                </p>
            </div>

            <!-- Сообщение об успехе/ошибке -->
            <div id="message" class="message"></div>

            <!-- Профиль пользователя (скрыт по умолчанию) -->
            <div class="auth-form" id="profile-form" style="display: none;">
                <h2>Профиль</h2>
                <div class="profile-info">
                    <p><strong>Имя:</strong> <span id="profile-name"></span></p>
                    <p><strong>Email:</strong> <span id="profile-email"></span></p>
                </div>
                <button id="logoutBtn" class="btn-primary">Выйти</button>
                <button id="testMeBtn" class="btn-primary" style="margin-top: 10px;">Тест /me</button>
                <pre id="meResult" style="display: none; background: #f4f4f4; padding: 10px; margin-top: 10px;"></pre>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
